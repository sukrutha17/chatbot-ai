<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }

        .chatbox {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        .response {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chatbox">
    <h2>🤖 Chatbot</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Type your message..." required>
        <button type="submit">Send</button>
    </form>

    {% if response %}
        <div class="response">
            Bot: {{ response }}
        </div>
    {% endif %}
</div>

</body>
</html>
